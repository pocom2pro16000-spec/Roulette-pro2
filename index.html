<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Pro 2.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-container">
    <div class="video-section">
        <div class="wheel-container">
            <div id="wheel" class="wheel">
                <img src="https://i.imgur.com/K7M08Uv.png" id="wheel-img" alt="Wheel">
                <div id="ball" class="ball"></div>
            </div>
            <div class="pointer">▼</div>
        </div>
        <div id="result-screen">PLACE YOUR BETS</div>
    </div>

    <div class="status-bar">
        <div class="stat-item">BALANCE: <span id="bal">5000</span></div>
        <div class="timer-box" id="timer">30</div>
        <div class="stat-item">BET: <span id="bet">0</span></div>
    </div>

    <div class="roulette-table">
        <div class="zero-cell" onclick="placeBet(0)">0</div>
        <div id="grid" class="numbers-grid">
            </div>
    </div>

    <div class="chip-bar">
        <div class="chip c10" onclick="selectChip(10)">10</div>
        <div class="chip c100" onclick="selectChip(100)">100</div>
        <div class="chip c1k" onclick="selectChip(1000)">1K</div>
        <div class="chip c10k" onclick="selectChip(10000)">10K</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
