<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casino-app">
        <div class="top-section">
            <div class="wheel-box">
                <img src="https://i.imgur.com/K7M08Uv.png" id="wheel-img">
                <div class="pointer">▼</div>
            </div>
        </div>

        <div class="info-bar">
            <div class="balance">₹<span id="bal">5000</span></div>
            <div class="timer" id="timer">30</div>
            <div class="bet-info">BET: ₹<span id="bet">0</span></div>
        </div>

        <div class="table-container">
            <div class="side-options">
                <div class="side-btn">1-18</div>
                <div class="side-btn">Even</div>
                <div class="side-btn red-diamond">♦</div>
                <div class="side-btn black-diamond">♦</div>
                <div class="side-btn">Odd</div>
                <div class="side-btn">19-36</div>
            </div>

            <div class="main-grid">
                <div class="zero" onclick="placeBet(0)">0</div>
                <div id="numbers" class="numbers-wrapper"></div>
                <div class="columns">
                    <div class="col-btn">2to1</div>
                    <div class="col-btn">2to1</div>
                    <div class="col-btn">2to1</div>
                </div>
            </div>
        </div>

        <div class="chips-section">
            <div class="chip c10" onclick="selectChip(10)">10</div>
            <div class="chip c100" onclick="selectChip(100)">100</div>
            <div class="chip c1k" onclick="selectChip(1000)">1K</div>
            <div class="chip c10k" onclick="selectChip(10000)">10K</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
